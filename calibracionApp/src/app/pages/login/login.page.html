<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-label position="stacked">
      Username
    </ion-label>

    <ion-input
      [(ngModel)]="username">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">
      Contraseña
    </ion-label>

    <ion-input
      type="password"
      [(ngModel)]="password">
    </ion-input>
  </ion-item>

  <ion-button
    expand="block"
    class="ion-margin-top"
    (click)="login()">

    Iniciar Sesión

  </ion-button>

</ion-content>
