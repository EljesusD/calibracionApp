{% extends "base.html" %}
{% block title %}Editar Cliente{% endblock %}

{% block content %}
<h1 class="mb-4">Editar Cliente</h1>
<form method="POST">
    <div class="mb-3">
        <label class="form-label">Nombre Empresa</label>
        <input type="text" class="form-control" name="nombre_empresa" value="{{ cliente.nombre_empresa }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Contacto</label>
        <input type="text" class="form-control" name="contacto" value="{{ cliente.contacto }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Teléfono</label>
        <input type="text" class="form-control" name="telefono" value="{{ cliente.telefono }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Correo</label>
        <input type="email" class="form-control" name="correo" value="{{ cliente.correo }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Dirección</label>
        <input type="text" class="form-control" name="direccion" value="{{ cliente.direccion }}">
    </div>
    <button type="submit" class="btn btn-primary">Actualizar</button>
    <a href="{{ url_for('listar_clientes') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
