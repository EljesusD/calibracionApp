{% extends "base.html" %}
{% block title %}Agregar Cliente{% endblock %}

{% block content %}
<h1 class="mb-4">Agregar Nuevo Cliente</h1>
<form method="POST" action="{{ url_for('nuevo_cliente') }}">
    <div class="mb-3">
        <label class="form-label">Nombre Empresa</label>
        <input type="text" class="form-control" name="nombre_empresa" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Contacto</label>
        <input type="text" class="form-control" name="contacto">
    </div>
    <div class="mb-3">
        <label class="form-label">Teléfono</label>
        <input type="text" class="form-control" name="telefono">
    </div>
    <div class="mb-3">
        <label class="form-label">Correo</label>
        <input type="email" class="form-control" name="correo">
    </div>
    <div class="mb-3">
        <label class="form-label">Dirección</label>
        <input type="text" class="form-control" name="direccion">
    </div>
    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="{{ url_for('listar_clientes') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
