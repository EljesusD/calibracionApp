{% extends "base.html" %}
{% block title %}Editar Servicio de Calibración{% endblock %}

{% block content %}
<h1 class="mb-4">Editar Servicio de Calibración</h1>

<form method="POST" action="{{ url_for('editar_servicio', id_servicio=servicio.id_servicio) }}">
    <!-- Selección de cliente -->
    <div class="mb-3">
        <label class="form-label">Cliente</label>
        <select class="form-select" name="id_cliente" required>
            {% for cliente in clientes %}
            <option value="{{ cliente.id_cliente }}" 
                {% if cliente.id_cliente == servicio.id_cliente %}selected{% endif %}>
                {{ cliente.nombre_empresa }}
            </option>
            {% endfor %}
        </select>
    </div>

    <!-- Datos del servicio -->
    <div class="mb-3">
        <label class="form-label">Nombre del Servicio</label>
        <input type="text" class="form-control" name="nombre_servicio" 
               value="{{ servicio.nombre_servicio }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Descripción</label>
        <textarea class="form-control" name="descripcion" rows="3">{{ servicio.descripcion }}</textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Costo (MXN)</label>
        <input type="number" step="0.01" class="form-control" name="costo" 
               value="{{ servicio.costo }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Tiempo Estimado (días)</label>
        <input type="number" class="form-control" name="tiempo_estimado" 
               value="{{ servicio.tiempo_estimado }}" required>
    </div>

    <!-- Equipos asociados -->
    <div class="mb-3">
        <label class="form-label">Equipos Asociados</label>
        {% for equipo in equipos %}
        <div class="form-check">
            <input class="form-check-input" type="checkbox" name="equipos" value="{{ equipo.id_equipo }}"
                {% if equipo in servicio.equipos %}checked{% endif %}>
            <label class="form-check-label">
                {{ equipo.nombre }} ({{ equipo.marca }} - {{ equipo.modelo }})
            </label>
        </div>
        {% endfor %}
    </div>

    <!-- Botones -->
    <button type="submit" class="btn btn-primary">Actualizar</button>
    <a href="{{ url_for('listar_servicios') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
