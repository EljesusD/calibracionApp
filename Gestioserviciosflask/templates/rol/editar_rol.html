{% extends "base.html" %}
{% block title %}Editar Rol{% endblock %}

{% block content %}
<h1 class="mb-4">Editar Rol</h1>
<form method="POST">
    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control" name="nombre" value="{{ rol.nombre }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Descripción</label>
        <textarea class="form-control" name="descripcion">{{ rol.descripcion }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Actualizar</button>
    <a href="{{ url_for('listar_roles') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
