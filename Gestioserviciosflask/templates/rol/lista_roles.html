{% extends "base.html" %}
{% block title %}Lista de Roles{% endblock %}

{% block content %}
<h1 class="mb-4">Roles Registrados</h1>
<a href="{{ url_for('agregar_rol') }}" class="btn btn-success mb-3">Agregar Nuevo Rol</a>
<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for rol in roles %}
        <tr>
            <td>{{ rol.id_rol }}</td>
            <td>{{ rol.nombre }}</td>
            <td>{{ rol.descripcion }}</td>
            <td>
                <a href="{{ url_for('editar_rol', id_rol=rol.id_rol) }}" class="btn btn-warning btn-sm">Editar</a>
                <form action="{{ url_for('eliminar_rol', id_rol=rol.id_rol) }}" method="POST" style="display:inline;">
                    <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('¿Seguro que deseas eliminar este rol?');">Eliminar</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
